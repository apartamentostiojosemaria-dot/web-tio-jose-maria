    <!-- JSON-LD: LodgingBusiness estatico (visible para todos los rastreadores sin JS) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LodgingBusiness",
      "name": "Apartamentos Rurales Tío José María",
      "description": "Alojamiento rural con encanto en Hinojares, Sierra de Cazorla. Casa del siglo XVII restaurada con 4 apartamentos exclusivos.",
      "url": "https://tiojosemaria.com",
      "telephone": "+34676344675",
      "email": "info@tiojosemaria.com",
      "priceRange": "60€ - 110€",
      "image": "https://tiojosemaria.com/og-default.jpg",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Calle Baja 1",
        "addressLocality": "Hinojares",
        "addressRegion": "Jaén",
        "postalCode": "23486",
        "addressCountry": "ES"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 37.7167,
        "longitude": -2.9
      },
      "starRating": { "@type": "Rating", "ratingValue": "4" },
      "amenityFeature": [
        { "@type": "LocationFeatureSpecification", "name": "WiFi Gratis", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Chimenea", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Calefacción", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Cocina equipada", "value": true }
      ],
      "numberOfRooms": 4,
      "petsAllowed": false
    }
    </script>

    <!-- SPA redirect: recupera la ruta guardada por 404.html y la restaura -->
    <script>
        (function () {
            var redirect = sessionStorage.getItem('spa-redirect');
            if (redirect && redirect !== '/') {
                sessionStorage.removeItem('spa-redirect');
                history.replaceState(null, '', redirect);
            }
        })();
    </script>

    <!-- Preconnect a CDN de imagenes (Supabase Storage) -->
    <link rel="preconnect" href="https://nmtukksbzbnuzqsksdmw.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://nmtukksbzbnuzqsksdmw.supabase.co">
