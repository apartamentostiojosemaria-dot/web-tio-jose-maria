<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartamentos Rurales Tío José María | Hinojares</title>
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

    <!-- canonical, meta description y Open Graph/Twitter los inyecta react-helmet-async
         (src/components/seo/PageHead.jsx) POR PÁGINA. NO ponerlos estáticos aquí: el prerender
         añade los de helmet sin borrar los del template y se DUPLICAN. Con dos <link canonical>,
         Google se queda con el primero (apuntaba a "/") y canonicaliza todas las subpáginas a la
         home → caen del índice. -->

    <!-- Geo -->
    <meta name="geo.region" content="ES-J">
    <meta name="geo.placename" content="Hinojares, Jaén">
    <meta name="geo.position" content="37.7167;-2.9">
    <meta name="ICBM" content="37.7167, -2.9">

    <!-- Favicon + PWA -->
    <meta name="theme-color" content="#556B2F">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/pwa-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/pwa-512.png">
    <link rel="apple-touch-icon" href="/assets/pwa-192.png">
    <link rel="manifest" href="/manifest.webmanifest">

    <!-- JSON-LD: LodgingBusiness estatico (visible para todos los rastreadores sin JS) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LodgingBusiness",
      "name": "Apartamentos Rurales Tío José María",
      "description": "Alojamiento rural con encanto en Hinojares, Sierra de Cazorla. Casa del siglo XVII restaurada con 4 apartamentos exclusivos.",
      "url": "https://tiojosemaria.com",
      "telephone": "+34676344675",
      "email": "apartamentostiojosemaria@gmail.com",
      "priceRange": "60€ - 110€",
      "image": "https://tiojosemaria.com/og-default.jpg",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Calle Baja 1",
        "addressLocality": "Hinojares",
        "addressRegion": "Jaén",
        "postalCode": "23486",
        "addressCountry": "ES"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 37.7167,
        "longitude": -2.9
      },
      "starRating": { "@type": "Rating", "ratingValue": "4" },
      "amenityFeature": [
        { "@type": "LocationFeatureSpecification", "name": "WiFi Gratis", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Chimenea", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Calefacción", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Cocina equipada", "value": true }
      ],
      "numberOfRooms": 4,
      "petsAllowed": false
    }
    </script>

    <!-- SPA redirect: recupera la ruta guardada por 404.html y la restaura -->
    <script>
        (function () {
            var redirect = sessionStorage.getItem('spa-redirect');
            if (redirect && redirect !== '/') {
                sessionStorage.removeItem('spa-redirect');
                history.replaceState(null, '', redirect);
            }
        })();
    </script>

    <!-- Preconnect a CDN de imagenes (Supabase Storage) -->
    <link rel="preconnect" href="https://nmtukksbzbnuzqsksdmw.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://nmtukksbzbnuzqsksdmw.supabase.co">

    <!-- Fuentes: self-hosted vía @fontsource (importadas en src/main.jsx). NO cargar
         Google Fonts aquí: la petición transmitiría la IP del visitante a Google (EEUU)
         antes de cualquier consentimiento (línea AEPD "Google Fonts"). -->
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
