# Cabeceras de seguridad (auditoria Cyber Neo CN-006).
#
# GOTCHA nginx: un location con su propio add_header (p.ej. Cache-Control)
# NO hereda los add_header definidos en el nivel server — los sustituye por
# completo. Por eso este fichero se declara como snippet y se incluye
# explicitamente en el nivel server Y en cada location que define su propio
# add_header, en vez de fiarse de la herencia.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
# CSP: permite recursos propios + Supabase (storage + functions + auth) + Google Fonts +
# tiles de Leaflet (CartoDB, OSM) + proxies iCal usados por syncService.
# 'unsafe-inline' en script-src es necesario para vite-plugin-pwa (registerSW.js).
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://www.tiojosemaria.com https://*.supabase.co https://images.unsplash.com https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://upload.wikimedia.org https://maps.gstatic.com https://maps.googleapis.com; media-src 'self' blob: https://*.supabase.co https://www.tiojosemaria.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.codetabs.com https://api.allorigins.win https://api.open-meteo.com; frame-src 'self' https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
