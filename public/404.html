<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Apartamentos Rurales Tío José María | Hinojares</title>
    <script>
        // SPA redirect para GitHub Pages.
        // Guarda la ruta solicitada y redirige a / para que React Router la resuelva.
        // Patron: https://github.com/rafgraph/spa-github-pages
        (function () {
            var l = window.location;
            sessionStorage.setItem('spa-redirect', l.pathname + l.search + l.hash);
            l.replace(l.protocol + '//' + l.host + '/');
        })();
    </script>
</head>
<body></body>
</html>
