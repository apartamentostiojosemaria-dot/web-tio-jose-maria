name: Render Welcome Video

on:
  workflow_dispatch:
    inputs:
      booking_id:
        description: 'UUID de la reserva'
        required: true
      guestName:
        description: 'Nombre del huésped'
        required: true
      apartmentName:
        description: 'Nombre del apartamento'
        required: true
      checkIn:
        description: 'Check-in YYYY-MM-DD'
        required: true
      checkOut:
        description: 'Check-out YYYY-MM-DD'
        required: true
      apartmentImages:
        description: 'JSON array de URLs (min 1, max 5)'
        required: true

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: remotion/package.json

      - name: Install
        working-directory: remotion
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          npm install --no-audit --no-fund

      - name: Build props JSON
        run: |
          cat > /tmp/props.json <<EOF
          {
            "guestName": $(jq -Rs . <<< "${{ inputs.guestName }}"),
            "apartmentName": $(jq -Rs . <<< "${{ inputs.apartmentName }}"),
            "checkIn": "${{ inputs.checkIn }}",
            "checkOut": "${{ inputs.checkOut }}",
            "apartmentImages": ${{ inputs.apartmentImages }}
          }
          EOF
          cat /tmp/props.json

      - name: Render WelcomeVideo
        working-directory: remotion
        run: |
          mkdir -p out
          npx remotion render src/index.ts WelcomeVideo out/welcome-${{ inputs.booking_id }}.mp4 \
            --props=/tmp/props.json \
            --concurrency=2

      - name: Upload to Supabase Storage
        id: upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FILENAME="welcome/welcome-${{ inputs.booking_id }}.mp4"
          curl -X POST \
            "$SUPABASE_URL/storage/v1/object/apartments/$FILENAME" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: video/mp4" \
            -H "x-upsert: true" \
            --data-binary @remotion/out/welcome-${{ inputs.booking_id }}.mp4
          echo "url=$SUPABASE_URL/storage/v1/object/public/apartments/$FILENAME" >> $GITHUB_OUTPUT

      - name: Save URL to BD
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VIDEO_URL: ${{ steps.upload.outputs.url }}
        run: |
          curl -X PATCH \
            "$SUPABASE_URL/rest/v1/bookings?id=eq.${{ inputs.booking_id }}" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"welcome_video_url\": \"$VIDEO_URL\"}"
