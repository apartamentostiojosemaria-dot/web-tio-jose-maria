## Redirect www → apex (301 permanente) para SEO
server {
    listen 80;
    server_name www.tiojosemaria.com;
    server_tokens off;
    return 301 https://tiojosemaria.com$request_uri;
}

server {
    listen 80 default_server;
    server_name tiojosemaria.com localhost _;
    server_tokens off;

    # Cabeceras de seguridad a nivel server: cubren cualquier location que NO
    # defina su propio add_header (redirects 301/302, /50x.html). Los location
    # que SÍ definen add_header propio (Cache-Control) repiten el include —
    # ver gotcha explicado en security-headers.conf.
    include /etc/nginx/security-headers.conf;

    # Compresión gzip: no había ninguna (verificado con curl Accept-Encoding).
    # Brotli no está disponible en la imagen base nginx:alpine sin módulos extra.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/html application/javascript application/json image/svg+xml application/manifest+json;

    # Rutas privadas solo-cliente (auth requerida en el propio SPA vía Supabase):
    # siempre sirven el shell index.html con 200 real, nunca el fallback 404 de
    # abajo — el router de React decide qué pintar (login, dashboard o "sin
    # permiso"), nginx no puede ni debe intentar adivinarlo.
    location ~ ^/(admin|clientes|auth)(/.*)?$ {
        root /usr/share/nginx/html;
        try_files $uri $uri/index.html /index.html;
        absolute_redirect off;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }

    # Rutas legacy (auditoria): URLs antiguas que hoy devuelven 200 con la
    # portada via el fallback SPA. 301 real para no perder autoridad SEO ni
    # confundir a crawlers/Airbnb con contenido duplicado.
    # absolute_redirect off en ambas: sin esto nginx completa el Location con
    # $scheme://$host y $scheme aquí es "http" (Traefik termina TLS y reenvía
    # en claro) — degradaría el 301 a HTTP, el mismo gotcha que ya evita
    # location / más abajo.
    location ~ ^/apartamentos-rurales/?$ {
        absolute_redirect off;
        return 301 /;
    }

    location ~ ^/apartamentos/([a-z0-9-]+)/?$ {
        absolute_redirect off;
        return 301 /apartamento/$1;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # IMPORTANTE: $uri/index.html (no $uri/) sirve el index del directorio
        # directamente sin hacer un 301 trailing-slash que detrás de un proxy
        # SSL terminator (Traefik) acaba degradando HTTPS → HTTP.
        # Fallback real a 404 (en vez de /index.html con 200): las rutas
        # públicas existen como fichero/directorio prerenderizado en dist
        # (scripts/prerender.js); lo que no exista ahí es una URL rota de
        # verdad, no una ruta del SPA sin renderizar todavía.
        try_files $uri $uri/index.html =404;
        # Cinturón de seguridad: si por lo que sea hay redirect (p. ej. directorio
        # sin index), que se haga relativo y respete el esquema original.
        absolute_redirect off;
        include /etc/nginx/security-headers.conf;
        # HTML siempre revalida para recoger el último build (los assets van hash+inmutable).
        add_header Cache-Control "no-cache";
    }

    # 404 real conservando el shell SPA: error_page SIN "=" preserva el status
    # 404 devuelto al cliente/crawler, pero el body es el index.html completo
    # para que React Router pinte su propia página de "no encontrado".
    error_page 404 /index.html;

    # Assets con hash en el nombre → cache largo e inmutable (mejora LCP/CWV en repeat-view).
    location /assets/ {
        root /usr/share/nginx/html;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # iCal export bonito: /ical/{slug}.ics → edge function ical-export.
    # Airbnb exige que la URL termine en .ics; con esto la URL pública es
    # https://tiojosemaria.com/ical/romero.ics y el redirect (preservado por
    # Airbnb cuando hace fetch) la lleva a la edge function que sirve el
    # calendario real.
    location ~ ^/ical/([a-z0-9-]+)\.ics$ {
        return 302 https://nmtukksbzbnuzqsksdmw.supabase.co/functions/v1/ical-export?slug=$1;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
