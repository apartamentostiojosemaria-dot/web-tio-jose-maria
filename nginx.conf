## Redirect www → apex (301 permanente) para SEO
server {
    listen 80;
    server_name www.tiojosemaria.com;
    server_tokens off;
    return 301 https://tiojosemaria.com$request_uri;
}

server {
    listen 80 default_server;
    server_name tiojosemaria.com localhost _;
    server_tokens off;

    # Cabeceras de seguridad (auditoria Cyber Neo CN-006)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
    # CSP: permite recursos propios + Supabase (storage + functions + auth) + Google Fonts +
    # tiles de Leaflet (CartoDB, OSM) + proxies iCal usados por syncService.
    # 'unsafe-inline' en script-src es necesario para vite-plugin-pwa (registerSW.js).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://www.tiojosemaria.com https://*.supabase.co https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://upload.wikimedia.org https://maps.gstatic.com https://maps.googleapis.com; media-src 'self' blob: https://*.supabase.co https://www.tiojosemaria.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.codetabs.com https://api.allorigins.win https://api.open-meteo.com; frame-src 'self' https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # IMPORTANTE: $uri/index.html (no $uri/) sirve el index del directorio
        # directamente sin hacer un 301 trailing-slash que detrás de un proxy
        # SSL terminator (Traefik) acaba degradando HTTPS → HTTP.
        try_files $uri $uri/index.html /index.html;
        # Cinturón de seguridad: si por lo que sea hay redirect (p. ej. directorio
        # sin index), que se haga relativo y respete el esquema original.
        absolute_redirect off;
    }

    # Assets: desactivado caching agresivo temporalmente para forzar actualizaciones
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # iCal export bonito: /ical/{slug}.ics → edge function ical-export.
    # Airbnb exige que la URL termine en .ics; con esto la URL pública es
    # https://tiojosemaria.com/ical/romero.ics y el redirect (preservado por
    # Airbnb cuando hace fetch) la lleva a la edge function que sirve el
    # calendario real.
    location ~ ^/ical/([a-z0-9-]+)\.ics$ {
        return 302 https://nmtukksbzbnuzqsksdmw.supabase.co/functions/v1/ical-export?slug=$1;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
