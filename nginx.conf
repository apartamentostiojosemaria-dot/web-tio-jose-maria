## Redirect www → apex (301 permanente) para SEO
server {
    listen 80;
    server_name www.tiojosemaria.com;
    server_tokens off;
    return 301 https://tiojosemaria.com$request_uri;
}

server {
    listen 80;
    server_name localhost;
    server_tokens off;

    # Cabeceras de seguridad (auditoria Cyber Neo CN-006)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
    # CSP: permite recursos propios + Supabase (storage + functions + auth) + Google Fonts +
    # tiles de Leaflet (CartoDB, OSM) + proxies iCal usados por syncService.
    # 'unsafe-inline' en script-src es necesario para vite-plugin-pwa (registerSW.js).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://*.supabase.co https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://upload.wikimedia.org https://maps.gstatic.com https://maps.googleapis.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://api.codetabs.com https://api.allorigins.win https://api.open-meteo.com; frame-src 'self' https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Assets: desactivado caching agresivo temporalmente para forzar actualizaciones
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
